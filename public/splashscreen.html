<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Forensic Biometrics Studio</title>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                user-select: none;
                -webkit-user-select: none;
                pointer-events: none;
                user-drag: none;
                -webkit-user-drag: none;
            }

            html,
            body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                background: transparent;
                font-family:
                    -apple-system, BlinkMacSystemFont, "SF Pro Display",
                    "Segoe UI", Roboto, Helvetica, sans-serif;
                color: #f3f1ec;
            }

            .splashscreen {
                position: relative;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: flex-start;
                width: 100%;
                height: 100%;
                padding: 1.75rem 2.25rem;
                background: #11140f;
                border-radius: 12px;
                overflow: hidden;
            }

            /* corner ticks */
            .splashscreen::before,
            .splashscreen::after {
                content: "";
                position: absolute;
                width: 14px;
                height: 14px;
                border: 1px solid hsl(124 41% 56%);
            }
            .splashscreen::before {
                top: 14px;
                left: 14px;
                border-right: none;
                border-bottom: none;
            }
            .splashscreen::after {
                bottom: 14px;
                right: 14px;
                border-left: none;
                border-top: none;
            }

            .wordmark {
                display: flex;
                flex-direction: column;
                line-height: 0.95;
                letter-spacing: -0.03em;
            }

            .wordmark__sup {
                font-size: 11px;
                font-weight: 500;
                letter-spacing: 0.4em;
                text-transform: uppercase;
                color: hsl(124 41% 56%);
                margin-bottom: 0.85rem;
            }

            .wordmark__main {
                font-size: 2.6rem;
                font-weight: 200;
                color: #f3f1ec;
            }

            .wordmark__main strong {
                font-weight: 600;
            }

            .wordmark__status {
                margin-top: 1.25rem;
                font-size: 1rem;
                font-weight: 400;
                letter-spacing: 0;
                color: hsl(124 10.46% 57.62%);
            }

            .splashscreen__accent {
                position: absolute;
                top: 50%;
                right: 1.75rem;
                width: 100px;
                height: 100px;
                transform: translateY(-50%) rotate(-28deg);
                opacity: 0.025;
                filter: invert(1);
                pointer-events: none;
            }
        </style>
    </head>
    <body>
        <div class="splashscreen">
            <img
                class="splashscreen__accent"
                src="logo.svg"
                alt=""
                draggable="false"
            />
            <div class="wordmark">
                <span class="wordmark__sup">Forensic</span>
                <span class="wordmark__main">Biometrics <strong>Studio</strong></span>
                <span class="wordmark__status">Loading…</span>
            </div>
        </div>
    </body>
</html>
