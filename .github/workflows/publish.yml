name: "publish"

# Triggers on push to the `release` branch.
on:
    push:
        branches:
            - release

jobs:
    publish-tauri:
        permissions:
            contents: write
        strategy:
            fail-fast: false
            matrix:
                platform: [macos-latest, windows-latest]

        runs-on: ${{ matrix.platform }}
        steps:
            - uses: actions/checkout@v4

            - name: setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: setup bun
              uses: oven-sh/setup-bun@v2

            - name: install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: install uv (Python package manager)
              uses: astral-sh/setup-uv@v3
              with:
                  enable-cache: true

            - name: cache pyfing PyInstaller venv
              uses: actions/cache@v4
              with:
                  path: |
                      .venv-pyfing
                      build-pyinstaller
                  key: ${{ runner.os }}-pyfing-${{ hashFiles('scripts/pyfing-requirements.txt', 'scripts/pyfing_enhance.spec', 'scripts/pyfing_enhance.py') }}

            - name: install frontend dependencies
              run: bun install --frozen-lockfile

            - name: build pyfing sidecar
              run: bun run sidecar:build:pyfing

            - uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tagName: app-v__VERSION__
                  releaseName: "App v__VERSION__"
                  releaseBody: "See the assets to download this version and install."
                  releaseDraft: false
                  prerelease: true
